name: Add issues to project
on:
  issues:
    types: [opened, reopened]
jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/EtoileArtStudio/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
